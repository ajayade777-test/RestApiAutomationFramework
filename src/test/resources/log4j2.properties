status = warn
name = PropertiesConfig

# Console appender
appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} [%t] %-5level %logger{36} - %msg%n

# File appender
appender.file.type = File
appender.file.name = LOGFILE
appender.file.fileName = Logs/test-log.log
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} [%t] %-5level %logger{36} - %msg%n

# Project-specific logger
logger.file.name = RestAssuredAutomationFramework
logger.file.level = debug
logger.file.additivity = false
logger.file.appenderRefs = stdout, logfile
logger.file.appenderRef.stdout.ref = STDOUT
logger.file.appenderRef.logfile.ref = LOGFILE

# Root logger
rootLogger.level = info
rootLogger.appenderRefs = stdout, logfile
rootLogger.appenderRef.stdout.ref = STDOUT
rootLogger.appenderRef.logfile.ref = LOGFILE
